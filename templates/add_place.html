<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Add New Place</title>
        <style>
            body {
                font-family: Arial;
                background-color: #f4f4f4;
                padding: 30px;
            }

            .form-container {
                max-width: 600px;
                background: white;
                margin: auto;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px #ccc;
            }

            input,
            textarea {
                width: 100%;
                height: 200px;
                padding: 10px;
                background: #ffffff84;
                border: 1px solid #6f4444;
                border-radius: 5px;
                resize: none;
                font-family: Arial, sans-serif;
            }

            button {
                background: #28a745;
                color: white;
                padding: 12px;
                border: none;
                border-radius: 5px;
                width: 100%;
                font-size: 16px;
            }

            button:hover {
                background: #218838;
            }
        </style>
    </head>

    <body>
        <div class="form-container">
            <h2>Add New Place</h2>
            <form method="POST">
                <label>Image URL:</label>
                <input type="text" name="link_photo" required>

                <label>Name Country</label>
                <input type="text" name="name_country" required>



                <label>Place Name:</label>
                <input type="text" name="name_place" required>

                <label>Lat:</label>
                <input type="number" name="lat" step="any" min="-90" max="90" required>

                <label>Lng:</label>
                <input type="number" name="lng" step="any" min="-180" max="180" required>


                <label>Description:</label>
                <textarea name="description" rows="5" required></textarea>

                <button type="submit">Add Place</button>
            </form>
        </div>
    </body>

</html>>
